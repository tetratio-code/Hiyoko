<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>12x12 Backgammon-like Prototype</title>
  <style>
    :root{
      --cell: 56px;
      --gap: 6px;

      --page-bg: #0f1a14;
      --panel-bg: rgba(255,255,255,0.04);

      --board-bg: #768f5d;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --warn: #fb7185;
    }

    body{
      margin:0; padding:18px;
      background: var(--page-bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans TC", Arial;
    }

    .wrap{
      display:flex; gap:18px; flex-wrap:wrap;
      align-items:flex-start;
    }

    .panel{
      min-width: 320px;
      background: var(--panel-bg);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 14px 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .row{
      display:flex; gap:10px; flex-wrap:wrap;
      align-items:center;
      margin: 8px 0;
    }

    button{
      background: rgba(56,189,248,0.15);
      border: 1px solid rgba(56,189,248,0.35);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 650;
    }

    .hint{
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 8px;
    }

    .board{
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(12, var(--cell));
      grid-template-rows: repeat(12, var(--cell));
      gap: var(--gap);
      background: var(--board-bg);
      padding: var(--gap);
      border-radius: 12px;
    }

    .cell{
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      position: relative;
      display:flex;
      align-items:flex-start;
      justify-content:center;
    }

    .cell::after{
      content: attr(data-xy);
      position:absolute;
      left:6px; top:6px;
      font-size: 10px;
      color: rgba(148,163,184,0.35);
    }

    .piece{
      width: calc(var(--cell) - 18px);
      height: calc(var(--cell) - 18px);
      border-radius: 10px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.35);
      margin-top: 9px;
    }

    .black{
      background: radial-gradient(circle at 30% 30%, rgba(40,55,70,1), rgba(6,10,16,1) 70%);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .white{
      background: #e5e7eb;
      border: 1px solid rgba(0,0,0,0.10);
    }

    .selOutline{
      outline: 3px solid rgba(56,189,248,0.85);
      outline-offset: -3px;
    }
    .grpGlow{
      box-shadow: 0 0 0 3px rgba(56,189,248,0.35) inset;
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="board">
    <div id="grid" class="grid"></div>
  </div>

  <div class="panel">
    <div class="row">
      <span id="turnBadge">Turn</span>
    </div>
    <div class="row">
      <button id="btnMove">Move</button>
      <button id="btnReset">Reset</button>
    </div>
    <div id="log" class="hint"></div>
  </div>
</div>

<script>
(() => {
  const STEP_DELAY = 100;
  const W = 12;
  const H = 12;
  const POINTS_PER_TURN = 6;

  function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

  const board = Array.from({length: W+1}, ()=>Array(H+1).fill(null));
  const gridEl = document.getElementById('grid');
  const logEl = document.getElementById('log');
  const turnBadgeEl = document.getElementById('turnBadge');

  let turn='B';
  let selected=null;
  let group=null;

  function dirOf(c){ return c==='B'?1:-1; }

  function log(msg){
    logEl.textContent = msg;
  }

  function clearBoard(){
    for(let x=1;x<=W;x++)
      for(let y=1;y<=H;y++)
        board[x][y]=null;
  }

  function placeInitial(){
    const blacks=[[1,1],[1,2],[1,3],[2,1],[2,2],[3,1]];
    const whites=[[12,1],[12,2],[12,3],[11,1],[11,2],[10,1]];
    blacks.forEach(([x,y])=>board[x][y]='B');
    whites.forEach(([x,y])=>board[x][y]='W');
  }

  function render(){
    gridEl.innerHTML='';
    for(let y=H;y>=1;y--){
      for(let x=1;x<=W;x++){
        const d=document.createElement('div');
        d.className='cell';
        d.dataset.x=x;
        d.dataset.y=y;
        d.setAttribute('data-xy',`${x},${y}`);

        const v=board[x][y];
        if(v){
          const p=document.createElement('div');
          p.className='piece '+(v==='B'?'black':'white');
          if(group && group.x===x && group.ys.includes(y))
            p.classList.add('grpGlow');
          d.appendChild(p);
        }

        if(selected && selected.x===x && selected.y===y)
          d.classList.add('selOutline');

        gridEl.appendChild(d);
      }
    }
    turnBadgeEl.textContent = turn==='B'?'黑棋':'白棋';
  }

  function computeGroup(x,y){
    const moverColor=board[x][y];
    if(!moverColor) return null;

    const ys=[];
    for(let yy=y;yy<=H;yy++){
      if(board[x][yy]!==null) ys.push(yy);
      else break;
    }
    return {x,ys,moverColor};
  }

  function countAllAbove(x,y){
    let c=0;
    for(let yy=y+1;yy<=H;yy++){
      if(board[x][yy]===null) break;
      c++;
    }
    return c;
  }

  function moveUpStep(g){
    const top=g.ys[g.ys.length-1];
    if(top>=H) return false;
    if(board[g.x][top+1]!==null) return false;

    for(let i=g.ys.length-1;i>=0;i--){
      const yy=g.ys[i];
      board[g.x][yy+1]=board[g.x][yy];
      board[g.x][yy]=null;
      g.ys[i]=yy+1;
    }
    return true;
  }

  function belowOccupiedOrGround(g){
    const bottom=g.ys[0];
    if(bottom===1) return true;
    return board[g.x][bottom-1]!==null;
  }

  function canMoveDown(g){
    const bottom=g.ys[0];
    if(bottom===1) return false;
    return board[g.x][bottom-1]===null;
  }

  function moveDown1(g){
    for(let i=0;i<g.ys.length;i++){
      const yy=g.ys[i];
      board[g.x][yy-1]=board[g.x][yy];
      board[g.x][yy]=null;
      g.ys[i]=yy-1;
    }
  }

  // 檢查可否「往前」：檢查「前下方」是否有其他棋子
  function frontBlocked(g){
    const nx = g.x + dirOf(g.moverColor);
    if(nx<1 || nx>W) return false;

    for(const yy of g.ys){
      const fy = yy - 1;
      if(fy < 1) continue;
      if(board[nx][fy] !== null) return true;
    }
    return false;
  }

  function moveForward1(g){
    const nx=g.x+dirOf(g.moverColor);
    if(nx<1||nx>W){
      for(const yy of g.ys) board[g.x][yy]=null;
      g.x=nx;
      return true;
    }
    for(const yy of g.ys){
      if(board[nx][yy] !== null) return false; // 保護
    }

    for(const yy of g.ys) board[nx][yy]=board[g.x][yy];
    for(const yy of g.ys) board[g.x][yy]=null;
    g.x=nx;
    return false;
  }

  async function performMove(){
    if(!selected||!group) return;
    if(group.moverColor!==turn) return;

    const above=countAllAbove(selected.x,selected.y);
    const moveAmount=Math.floor(POINTS_PER_TURN/(above+1));
    log(`上方棋子數=${above}，移動量=${moveAmount}`);

    for(let i=0;i<moveAmount;i++){
      if(moveUpStep(group)){
        render();
        await sleep(STEP_DELAY);
      } else break;
    }

    // 改成：前 -> 下 -> (暫停) -> loop
    while(true){
      if(frontBlocked(group)){
        while(canMoveDown(group)){
          moveDown1(group);
          render();
          await sleep(STEP_DELAY);
        }
        break;
      }

      const out=moveForward1(group);
      if(out){
        render();
        await sleep(STEP_DELAY);
        break;
      }

      // 前移後立刻檢查並（必要時）下移，不在前移後暫停
      if(!belowOccupiedOrGround(group)){
        moveDown1(group);
      }

      render();
      await sleep(STEP_DELAY);

      if(belowOccupiedOrGround(group)) break;
    }

    turn=turn==='B'?'W':'B';
    selected=null;
    group=null;
    render();
  }

  // 點選棋子後自動 move
  gridEl.addEventListener('click', async e=>{
    const cell=e.target.closest('.cell');
    if(!cell) return;

    const x=Number(cell.dataset.x);
    const y=Number(cell.dataset.y);

    if(board[x][y]!==turn) return;

    selected={x,y};
    group=computeGroup(x,y);
    render();
    await sleep(50);
    await performMove();
  });

  document.getElementById('btnMove').onclick=performMove;
  document.getElementById('btnReset').onclick=()=>{
    clearBoard();
    placeInitial();
    turn='B';
    selected=null;
    group=null;
    log('');
    render();
  };

  clearBoard();
  placeInitial();
  render();
})();
</script>
</body>
</html>
